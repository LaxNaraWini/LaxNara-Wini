*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{

}

body{

radial-gradient(circle at top left,#FFE7F1 0%,transparent 30%),
radial-gradient(circle at top right,#FFEAF5 0%,transparent 30%),
radial-gradient(circle at bottom left,#FFDDEB 0%,transparent 35%),

/* dreamy background */

.background{

top:0;
left:0;

width:100%;
height:100%;

overflow:hidden;

}

/* blobs */

.blob{

position:absolute;

border-radius:50%;

filter:blur(140px);

opacity:.45;

animation:floatBlob 18s ease-in-out infinite alternate;

}

.blob1{

height:450px;

background:#FFD5E5;

top:-150px;
left:-150px;

}

.blob2{

width:420px;
height:420px;

background:#FFE7F2;

top:20%;
right:-120px;

}

.blob3{

width:350px;
height:350px;

background:#FFD9EA;

bottom:-120px;
left:20%;

}

.blob4{

width:300px;
height:300px;

background:#FFF0F6;

bottom:50px;
right:10%;

}

@keyframes floatBlob{

0%{

transform:translateY(0) scale(1);

}

100%{

transform:translateY(-40px) scale(1.08);

}

}

NAVIGATION

nav{

}

}

.secondary-btn{

color:#C87999;

font-weight:600;

transition:.45s;

box-shadow:0 15px 35px rgba(255,210,225,.25);

}

.secondary-btn:hover{

transform:translateY(-6px);

}

.socials{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:18px;

margin-top:20px;

}

.socials a{

text-decoration:none;

padding:12px 24px;

border-radius:999px;

background:rgba(255,255,255,.55);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.7);

color:#C87999;

font-weight:600;

transition:.4s;

box-shadow:0 10px 25px rgba(255,190,210,.15);

}

.socials a:hover{

background:#F8C7D9;

color:white;

transform:translateY(-5px);

}

.hero-flower{

position:absolute;

font-size:55px;

opacity:.22;

animation:floatFlower 8s ease-in-out infinite;

}

.flower-left{

top:20px;

}

.flower-right{

right:-40px;

bottom:20px;

}

@keyframes floatFlower{

0%{

transform:translateY(0) rotate(0deg);

}

50%{

transform:translateY(-15px) rotate(6deg);

}

100%{

transform:translateY(0) rotate(0deg);

}

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

/* ==========================
   SECTION LAYOUT
========================== */

.section{

width:100%;

max-width:1350px;

margin:auto;

padding:120px 25px;

position:relative;

}

.section-heading{

text-align:center;

margin-bottom:70px;

}

.section-heading span{

display:inline-block;

padding:10px 22px;

border-radius:999px;

background:rgba(255,255,255,.55);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.75);

font-size:14px;

font-weight:600;

letter-spacing:2px;

text-transform:uppercase;

color:#D082A0;

margin-bottom:25px;

}

.section-heading h3{

font-family:'Cormorant Garamond',serif;

font-size:64px;

font-weight:600;

line-height:1.15;

color:#C87496;

margin-bottom:18px;

}

.section-heading p{

max-width:720px;

margin:auto;

font-size:18px;

line-height:2;

color:#6D5A65;

}

/* ==========================
   BLOG GRID
========================== */

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(330px,1fr));

gap:35px;

margin-top:50px;

}

/* ==========================
   LUXURY CARD
========================== */

.card{

position:relative;

padding:38px;

border-radius:34px;

overflow:hidden;

background:rgba(255,255,255,.62);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.8);

box-shadow:

0 20px 50px rgba(255,185,210,.18),

0 10px 25px rgba(255,255,255,.55);

transition:.6s cubic-bezier(.2,.8,.2,1);

}

.card:hover{

transform:translateY(-14px) scale(1.02);

box-shadow:

0 35px 80px rgba(255,170,205,.28);

}

/* dreamy glow */

.card::before{

content:"";

position:absolute;

width:220px;

height:220px;

background:rgba(255,215,230,.45);

border-radius:50%;

filter:blur(70px);

top:-120px;

right:-120px;

}

/* shine */

.card::after{

content:"";

position:absolute;

top:-120%;

left:-60%;

width:60%;

height:300%;

background:linear-gradient(

90deg,

transparent,

rgba(255,255,255,.35),

transparent

);

transform:rotate(25deg);

transition:1s;

}

.card:hover::after{

left:130%;

}

/* ==========================
   ICON
========================== */

.card-icon{

width:70px;

height:70px;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:30px;

background:linear-gradient(

135deg,

#FFE6F1,

#FFD0E2

);

box-shadow:

0 12px 30px rgba(255,180,205,.25);

margin-bottom:28px;

}

/* ==========================
   CARD TITLE
========================== */

.card h4{

font-family:'Cormorant Garamond',serif;

font-size:34px;

font-weight:600;

line-height:1.2;

color:#B86C8A;

margin-bottom:20px;

}

/* ==========================
   CARD TEXT
========================== */

.card p{

font-size:16px;

line-height:2;

color:#6B5A64;

margin-bottom:28px;

}

/* ==========================
   BUTTON
========================== */

.card a{

display:inline-flex;

align-items:center;

gap:8px;

padding:14px 26px;

border-radius:999px;

background:linear-gradient(

135deg,

#F8C9DA,

#F3B4CB

);

color:white;

font-weight:600;

text-decoration:none;

transition:.45s;

box-shadow:

0 12px 28px rgba(243,180,203,.3);

}

.card a:hover{

transform:translateY(-4px);

box-shadow:

0 20px 40px rgba(243,180,203,.42);

}

/* ==========================================
   PINK PARADISE EFFECTS
========================================== */

/* --------------------
   FLOATING CLOUDS
-------------------- */

.cloud{

position:absolute;

background:rgba(255,255,255,.55);

border-radius:100px;

filter:blur(8px);

opacity:.55;

animation:cloudMove linear infinite;

}

.cloud::before,

.cloud::after{

content:"";

position:absolute;

background:inherit;

border-radius:50%;

}

.cloud1{

width:180px;

height:60px;

top:10%;

left:-220px;

animation-duration:45s;

}

.cloud1::before{

width:70px;

height:70px;

left:25px;

top:-30px;

}

.cloud1::after{

width:90px;

height:90px;

right:20px;

top:-40px;

}

.cloud2{

width:240px;

height:70px;

top:32%;

left:-280px;

animation-duration:60s;

animation-delay:-20s;

}

.cloud2::before{

width:80px;

height:80px;

left:30px;

top:-35px;

}

.cloud2::after{

width:110px;

height:110px;

right:25px;

top:-45px;

}

@keyframes cloudMove{

from{

transform:translateX(0);

}

to{

transform:translateX(calc(100vw + 500px));

}

}

/* --------------------
   GLOWING MOON
-------------------- */

.moon{

position:absolute;

top:90px;

right:90px;

width:90px;

height:90px;

border-radius:50%;

background:#FFFDFE;

box-shadow:

0 0 35px rgba(255,255,255,.9),

0 0 80px rgba(255,210,235,.7),

0 0 150px rgba(255,210,235,.35);

animation:moonGlow 5s ease-in-out infinite alternate;

}

@keyframes moonGlow{

from{

transform:scale(1);

}

to{

transform:scale(1.06);

}

}

/* --------------------
   SPARKLES
-------------------- */

.sparkles{

position:absolute;

inset:0;

overflow:hidden;

pointer-events:none;

}

.sparkles::before{

content:"";

position:absolute;

width:4px;

height:4px;

background:white;

border-radius:50%;

box-shadow:

120px 80px #fff,

300px 220px #fff,

450px 110px #fff,

650px 180px #fff,

820px 90px #fff,

1000px 280px #fff,

1150px 120px #fff,

1400px 240px #fff,

1600px 160px #fff,

1750px 60px #fff,

250px 500px #fff,

620px 620px #fff,

980px 720px #fff,

1500px 640px #fff,

1800px 520px #fff;

animation:twinkle 3s ease-in-out infinite alternate;

opacity:.85;

}

@keyframes twinkle{

from{

opacity:.2;

transform:scale(.8);

}

to{

opacity:1;

transform:scale(1.5);

}

}

/* --------------------
   BUTTERFLIES
-------------------- */

.butterflies{

position:absolute;

inset:0;

pointer-events:none;

overflow:hidden;

}

.butterflies::before,

.butterflies::after{

content:"🦋";

position:absolute;

font-size:26px;

opacity:.45;

animation:fly 22s linear infinite;

}

.butterflies::before{

left:-50px;

top:35%;

}

.butterflies::after{

right:-50px;

top:65%;

animation-delay:-10s;

}

@keyframes fly{

0%{

transform:translateX(0) translateY(0) rotate(0deg);

}

25%{

transform:translateX(25vw) translateY(-30px) rotate(8deg);

}

50%{

transform:translateX(50vw) translateY(20px) rotate(-6deg);

}

75%{

transform:translateX(75vw) translateY(-25px) rotate(5deg);

}

100%{

transform:translateX(110vw) translateY(10px) rotate(0deg);

}

}

/* --------------------
   FALLING PETALS
-------------------- */

.petals{

position:absolute;

inset:0;

pointer-events:none;

overflow:hidden;

}

.petals::before{

content:"🌸 🌸 🌸 🌸 🌸 🌸 🌸 🌸 🌸 🌸";

position:absolute;

left:-5%;

top:-80px;

font-size:26px;

letter-spacing:90px;

animation:petalFall 18s linear infinite;

opacity:.5;

}

@keyframes petalFall{

0%{

transform:translateY(-100px) rotate(0deg);

}

100%{

transform:translateY(120vh) rotate(360deg);

}

}

}

.shop-card h4{

font-size:46px;

margin-bottom:20px;

}

.shop-card p{

}

.shop-card a{

}

.shop-card a:hover{

transform:translateY(-5px);

box-shadow:0 25px 60px rgba(243,180,203,.45);

}

/* ==========================================
   DIVIDER
========================================== */

.divider{

display:flex;

align-items:center;

justify-content:center;

gap:20px;

margin:80px auto;

max-width:500px;

}

.line{

flex:1;

#E8B5C9,

transparent);

}

.flower{

color:#D689A7;

}

/* ==========================================
   LINKS
========================================== */

a{

transition:.35s ease;

}

/* ==========================================
   SELECTION
========================================== */

::selection{

background:#F7C8DA;

color:white;

}

/* ==========================================
   SCROLLBAR
========================================== */

::-webkit-scrollbar{

width:10px;

}

::-webkit-scrollbar-track{

background:#FFF5F8;

}

::-webkit-scrollbar-thumb{

background:#E8AFC5;

@media(max-width:480px){

}

}

.card h4{

font-size:28px;

}

}
